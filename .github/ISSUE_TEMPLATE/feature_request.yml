name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
assignees:
  - wwsean08
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What workflow is painful or missing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the behavior or feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there other approaches you've tried or considered? Why don't they work well?

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Mockups, links to related issues, or examples from other tools that do this well
